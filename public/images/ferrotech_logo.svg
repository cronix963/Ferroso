<svg width="180" height="36" viewBox="0 0 180 36" xmlns="http://www.w3.org/2000/svg">
  <!-- Gear icon -->
  <g transform="translate(18, 18)">
    <circle cx="0" cy="0" r="16" fill="#2d3a4a"/>
    <g fill="#E85D04">
      <rect x="-3" y="-20" width="6" height="8" rx="1.5"/>
      <rect x="-3" y="12" width="6" height="8" rx="1.5"/>
      <rect x="12" y="-3" width="8" height="6" rx="1.5"/>
      <rect x="-20" y="-3" width="8" height="6" rx="1.5"/>
      <rect x="7" y="-18" width="6" height="8" rx="1.5" transform="rotate(45 10 -14)"/>
      <rect x="-18" y="-7" width="6" height="8" rx="1.5" transform="rotate(45 -15 -3)"/>
      <rect x="10" y="10" width="6" height="8" rx="1.5" transform="rotate(-45 13 14)"/>
      <rect x="-18" y="7" width="6" height="8" rx="1.5" transform="rotate(-45 -15 11)"/>
    </g>
    <circle cx="0" cy="0" r="13" fill="#2d3a4a"/>
    <circle cx="0" cy="0" r="10" fill="#1a1a2e"/>
    <circle cx="0" cy="0" r="5" fill="#E85D04"/>
    <circle cx="0" cy="0" r="3" fill="#1a1a2e"/>
    <!-- Wrench -->
    <g transform="rotate(-35)" fill="#f5f5f0">
      <rect x="-2" y="-12" width="4" height="20" rx="2"/>
      <rect x="-6" y="-16" width="12" height="7" rx="2"/>
      <rect x="-4" y="-15" width="4" height="5" rx="1.5" fill="#1a1a2e"/>
      <rect x="0" y="-15" width="4" height="5" rx="1.5" fill="#1a1a2e"/>
      <rect x="-6" y="4" width="12" height="5" rx="2"/>
      <rect x="-3" y="3" width="6" height="4" rx="1" fill="#1a1a2e"/>
    </g>
  </g>
  <!-- FERROTECH text -->
  <text x="42" y="24" font-family="'Arial Black', Arial, sans-serif" font-size="18" font-weight="900" fill="#f5f5f0" letter-spacing="1.5">FERRO</text>
  <text x="42" y="34" font-family="'Arial Black', Arial, sans-serif" font-size="12" font-weight="900" fill="#E85D04" letter-spacing="1.5">TECH</text>
